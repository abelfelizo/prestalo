name: Actualización por aire (OTA)

# Publica los cambios de JS/pantallas directo a los teléfonos (sin reinstalar APK).
# Se ejecuta en cada push a main, salvo cambios que requieren recompilar (ver build-apk.yml).
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'package.json'
      - 'package-lock.json'
      - 'app.json'
      - 'eas.json'
      - 'assets/**'
      - '.github/workflows/**'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Crear archivo .env (llaves públicas de Supabase)
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=https://pphnaasmirbnuilgzfeo.supabase.co" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwaG5hYXNtaXJibnVpbGd6ZmVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTQ2MzQsImV4cCI6MjA4OTU5MDYzNH0.byFCgsk1t8OpWiy4ZcTmMed3hfyZgotbBmc6tpVsIV4" >> .env

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: Publicar actualización OTA
        run: eas update --branch production --platform android --message "${{ github.sha }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
